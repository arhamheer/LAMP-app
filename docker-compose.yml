services:
  db:
    image: mysql:5.7
    container_name: bcs7_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mydb
    ports:
      - "3406:3306"
    volumes:
      - ./:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
  web:
    image: php:mysqli
    container_name: bcs7_web
    depends_on:
      - db
    volumes:
      - ./php/:/var/www/html/
    ports:
      - "8200:80"
    environment:
      - MYSQL_HOST=172.31.18.106:3406
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpass
      - MYSQL_DATABASE=mydb

volumes:
  mysql_data:
